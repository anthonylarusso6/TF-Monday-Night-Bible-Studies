<script>
var notes={},attend={},liked={},curTab='all',curIdx=0,data=[];

var topics=["Depression & Dark Seasons","Anxiety & Worry","Identity — Who You Are in Christ","Forgiveness — Giving It & Receiving It","Purpose & Calling","Faith Over Fear","Prayer — Actually Talking to God","Anger & Self-Control","Jealousy & Comparison","Grief & Loss","Doubt & Unanswered Questions","Integrity When No One Is Watching","Honoring Your Parents","Handling Failure & Mistakes","Social Media & the Highlight Reel","Standing Up for What's Right","Serving Others Before Yourself","Trust — When Life Doesn't Make Sense","Healing — Emotional & Spiritual","Surrender — Letting Go & Letting God"];

function initData(){
data=[
{id:1,date:"Apr 2, 2026",title:"Perfectionism: When Good Enough Feels Like Never Enough",series:"Identity & Worth",draft:false,anchor:{ref:"Psalm 34:18 (NLT)",text:"The Lord is close to the brokenhearted; he rescues those whose spirits are crushed."},sup:[{ref:"Romans 8:1 (NLT)",text:"So now there is no condemnation for those who belong to Christ Jesus."},{ref:"2 Corinthians 12:9 (NLT)",text:"My grace is sufficient for you, for my power is made perfect in weakness."}],bi:"Perfectionism is not just high standards — it is a trap. It tells you that your worth is tied to your performance. But God never called you to be perfect. He called you to be His.",bd:[{ph:"The Lord is close...",pts:["Not distant. Not disappointed. Not waiting for you to fix yourself first.","God does not pull back when you fall apart — He moves toward you."],co:{lb:"Say this to your students",tx:"Think about the last time you completely failed. Your instinct was probably to hide. But God moves closer to the exact moment you feel most broken."}},{ph:"...to the brokenhearted...",pts:["Perfectionism breaks hearts quietly — through constant pressure and fear of not measuring up.","God sees that kind of pain. It does not have to be dramatic to be real."],co:{lb:"Real-life example",tx:"Maybe nobody knows you are struggling. You look fine on the outside but inside you are exhausted from trying to be everything to everyone."}},{ph:"...he rescues those whose spirits are crushed.",pts:["Perfectionism crushes you slowly — every mistake feels like evidence that you are not enough.","God's response to a crushed spirit is not a lecture. It is rescue."],co:{lb:"Say this to your students",tx:"God does not say you should have tried harder. He says let Me carry that."}}],sbd:[{ref:"Romans 8:1",pt:"Perfectionism runs on condemnation — that voice that says you failed again. Paul draws a hard line: that voice is not from God."},{ref:"2 Corinthians 12:9",pt:"Perfectionism says hide your weakness. God says bring it to Me. His grace is fully enough for your worst day."}],qs:[{q:"Where in your life do you feel the most pressure to be perfect?",a:"That pressure usually shows up loudest where your identity feels most at stake — grades, sports, how you look to other people."},{q:"What does the voice of perfectionism actually sound like in your head?",a:"It is repetitive and exhausting. If you would not say it to your best friend after they failed, stop saying it to yourself."},{q:"How does perfectionism affect the way you see God?",a:"Perfectionism can make God feel like a scorekeeper instead of a Father. But Romans 8:1 already settled it — you do not perform for His love."},{q:"What is the difference between high standards and perfectionism?",a:"High standards push you to grow. Perfectionism punishes you for being human."},{q:"Why is it hard to let people see you struggling?",a:"Because perfectionism tells you failure makes you less valuable. But vulnerability is where real connection happens."},{q:"What is one area where you need to stop performing and be honest with God?",a:"Perfectionism thrives in silence. Honesty with God is where freedom starts."}],tk:[{ti:"Perfectionism is fear in disguise.",bo:"It looks like high standards but it is really the fear that your worth depends on your performance."},{ti:"God moves closest when you feel most broken.",bo:"You do not have to fix yourself before coming to Him."},{ti:"His grace is enough for your worst day.",bo:"You were never called to be perfect. You were called to be His."}]},
{id:2,date:"Mar 30, 2026",title:"Gratitude: A Weapon, Not Just a Feeling",series:"Heart & Posture",draft:false,anchor:{ref:"1 Thessalonians 5:18 (NIV)",text:"Give thanks in all circumstances; for this is God's will for you in Christ Jesus."},sup:[{ref:"Philippians 4:6-7 (NIV)",text:"Do not be anxious about anything, but in every situation, by prayer and petition, with thanksgiving, present your requests to God."},{ref:"Psalm 100:4 (NIV)",text:"Enter his gates with thanksgiving and his courts with praise; give thanks to him and praise his name."}],bi:"Gratitude is not a feeling you wait for — it is a decision you make. Scripture does not say give thanks FOR all circumstances. It says give thanks IN all circumstances. Gratitude is not denial. It is a weapon against despair.",bd:[{ph:"Give thanks...",pts:["This is a command — not a suggestion.","The word give implies action. Gratitude is not passive."],co:{lb:"Say this to your students",tx:"Think about the last time you genuinely thanked someone and meant it. That moment did not just happen. You chose to recognize it."}},{ph:"...in all circumstances...",pts:["Not just good ones. Not just when life is going your way.","All means the awkward season, the broken friendship, the failed test."],co:{lb:"Real-life example",tx:"This does not mean pretend everything is fine. It means trust that God is present even when things are not fine."}},{ph:"...for this is God's will for you in Christ Jesus.",pts:["Students spend a lot of time asking what God's will is. Here it is.","God's will includes the posture of your heart right now."],co:{lb:"Say this to your students",tx:"He wants you to be a thankful person. Not just when things are good — always."}}],sbd:[{ref:"Philippians 4:6-7",pt:"You cannot be fully anxious and fully grateful at the same time. Gratitude redirects your focus from what could go wrong to what God has already done."},{ref:"Psalm 100:4",pt:"David frames thanksgiving as the way you enter God's presence. Not performance — thankfulness. Gratitude is how you get there."}],qs:[{q:"What is the difference between being grateful FOR something vs. IN something?",a:"Grateful for means you only thank God when things are good. Grateful in means you trust God even when they are not."},{q:"Why is it hard to feel grateful when life is hard?",a:"Because gratitude can feel fake when you are in pain. But it means choosing to look at God's faithfulness alongside the pain."},{q:"How does comparison kill gratitude?",a:"When you are measuring your life against someone else's highlight reel, what you have never feels like enough."},{q:"Can you think of something you have stopped being grateful for because it feels normal?",a:"Familiarity breeds ingratitude. Blessings do not disappear — our attention does."},{q:"How does gratitude function as a weapon against anxiety?",a:"You cannot be fully anxious and fully grateful at the same time."},{q:"What would it look like to practice gratitude on a hard day and mean it?",a:"Not performing positivity. Honestly naming something real — even small — that God has provided."}],tk:[{ti:"Gratitude is a choice, not a feeling.",bo:"You do not wait until you feel thankful — you practice it until you do."},{ti:"Comparison is the enemy of gratitude.",bo:"When your eyes are on everyone else's life, you miss what God is doing in yours."},{ti:"Thankfulness is God's will — and it protects your heart.",bo:"A grateful person is hard to deceive, hard to embitter, and hard to pull away from God."}]},
{id:3,date:"Feb 23, 2026",title:"Loneliness and God's Presence",series:"Heart & Posture",draft:false,anchor:{ref:"Psalm 34:18 (NLT)",text:"The Lord is close to the brokenhearted; he rescues those whose spirits are crushed."},sup:[{ref:"Deuteronomy 31:6 (NLT)",text:"He will not fail you or abandon you."},{ref:"Matthew 28:20 (NIV)",text:"And surely I am with you always, to the very end of the age."}],bi:"Feeling lonely does not mean something is wrong with you. It means you are human. God sees you — even in quiet moments. You are never alone to God.",bd:[{ph:"The Lord is close to the brokenhearted...",pts:["Close — not watching from a distance. Present, near, aware.","Brokenhearted covers the student who feels invisible, who smiles but goes home empty."],co:{lb:"Say this to your students",tx:"Nobody has to know you are struggling for God to know. He is already close in the exact moment you feel the most unseen."}},{ph:"...he rescues those whose spirits are crushed.",pts:["Crushed implies something heavy has been sitting on you for a while.","His response to a crushed spirit is not a lecture. It is rescue."],co:{lb:"Real-life example",tx:"You can be surrounded by people and still feel completely alone. That kind of loneliness is real and God is not surprised by it."}}],sbd:[{ref:"Deuteronomy 31:6",pt:"God did not say figure it out — He said I will not fail you or abandon you. That promise still applies to every uncertain and lonely moment you walk into."},{ref:"Matthew 28:20",pt:"Jesus said this right before He left. The last thing He wanted His people to know was that He was not actually leaving. Always — not sometimes. Always."}],qs:[{q:"What is the difference between being alone and feeling lonely?",a:"Being alone means no one is around. Loneliness means feeling unseen — and you can feel it in a crowded room."},{q:"When do you feel the most lonely?",a:"At night, scrolling, when you compare yourself to others. Let them answer honestly."},{q:"Why does God say He is close to the brokenhearted — not the strong?",a:"Because the brokenhearted are the ones who need Him most."},{q:"What does unhealthy loneliness look like?",a:"Isolating more, scrolling endlessly, chasing validation, pretending you are fine."},{q:"What does healthy support look like in a lonely season?",a:"Talking to someone safe, being honest with God, doing life with community."},{q:"How does knowing God is always with you change lonely moments?",a:"You are never actually alone — even when it feels that way."}],tk:[{ti:"Loneliness is a feeling — not your identity.",bo:"You are not forgotten. You are not invisible. You are not too much."},{ti:"God moves closest when you feel most alone.",bo:"He does not wait for you to get it together. He meets you in the middle of it."},{ti:"Asking for connection is not weakness.",bo:"It is courage. And it is exactly what God designed you for."}]},
{id:4,date:"Jan 26, 2026",title:"Accountability That Protects Your Heart",series:"Relationships",draft:false,anchor:{ref:"Proverbs 4:23 (NLT)",text:"Guard your heart above all else, for it determines the course of your life."},sup:[{ref:"Proverbs 13:20 (NLT)",text:"Walk with the wise and become wise; associate with fools and get in trouble."},{ref:"Galatians 6:1-2 (NLT)",text:"If another believer is overcome by some sin, gently and humbly help that person back onto the right path."}],bi:"God cares about you — not just your behavior, but your heart. Accountability is not about catching mistakes. It is about helping each other make wise choices. Your heart matters.",bd:[{ph:"Guard your heart above all else...",pts:["Above all else — not as one thing on the list, but as the top priority.","Your heart is the source. Everything you do, say, and become flows from it."],co:{lb:"Say this to your students",tx:"Guarding your heart is not about building walls. It is about being intentional about what you let in."}},{ph:"...for it determines the course of your life.",pts:["Your heart shapes your direction. Protect it poorly and your whole life reflects that.","The people you let speak into your heart have influence over your future."],co:{lb:"Real-life example",tx:"Small inputs over time produce big outputs. The voices and relationships you let closest are shaping your future right now."}}],sbd:[{ref:"Proverbs 13:20",pt:"Who you walk with has direct access to your heart. Guarding your heart starts with guarding who gets closest to it."},{ref:"Galatians 6:1-2",pt:"When someone in your circle is drifting, the loving response is not silence — it is gentle, humble, honest care."}],qs:[{q:"What does it mean to guard your heart in everyday life?",a:"Being intentional about what you consume, who you spend time with, what conversations you allow."},{q:"What is slowly affecting your heart without you fully realizing it?",a:"Social media, music, certain friendships. The slow drip is the most dangerous."},{q:"How do the people closest to you protect or expose your heart?",a:"Close relationships have the most access. They shape your thinking, your values, your habits."},{q:"What is the difference between isolation and guarding your heart?",a:"Isolation shuts everyone out out of fear. Guarding your heart is intentional."},{q:"What does it look like to gently help someone who is drifting?",a:"Private, humble, honest conversation. Caring enough to say the hard thing in the right way."},{q:"Who do you need to be more intentional about guarding your heart around?",a:"This is personal. Give them space to think."}],tk:[{ti:"Your heart determines the course of your life.",bo:"Guard it intentionally. What you let in shapes where you end up."},{ti:"Accountability is one of the ways you guard your heart.",bo:"The right people around you are protection. The wrong ones are exposure."},{ti:"Loving someone sometimes means saying the hard thing.",bo:"Gentle, humble honesty is how you protect the hearts of the people around you."}]},
{id:5,date:"Jan 19, 2026",title:"Accountability That Develops You",series:"Relationships",draft:false,anchor:{ref:"Proverbs 27:17 (NLT)",text:"As iron sharpens iron, so a friend sharpens a friend."},sup:[{ref:"Ecclesiastes 4:9-10 (NLT)",text:"Two people are better off than one. If one person falls, the other can reach out and help."},{ref:"Hebrews 10:24-25 (NLT)",text:"Let us think of ways to motivate one another to acts of love and good works."}],bi:"Accountability is not punishment — it is protection. Peer pressure pulls you toward comfort. Accountability pushes you toward growth. The people you listen to will shape the person you become.",bd:[{ph:"As iron sharpens iron...",pts:["Iron does not get sharper by sitting still. It gets sharper through friction.","You do not grow by avoiding hard conversations."],co:{lb:"Say this to your students",tx:"If nobody in your life ever challenges you, you are not getting sharper. You are just getting more comfortable."}},{ph:"...so a friend sharpens a friend.",pts:["Real accountability goes both ways.","A friend who only tells you what you want to hear is not sharpening you."],co:{lb:"Real-life example",tx:"Think about who has said something hard to you that turned out to be exactly what you needed to hear. That is who you want in your corner."}}],sbd:[{ref:"Ecclesiastes 4:9-10",pt:"God never designed you to do life alone. The danger is not falling. The danger is falling alone with nobody to help you back up."},{ref:"Hebrews 10:24-25",pt:"When you stop showing up — to church, to your people, to the table — you lose the encouragement that keeps you going."}],qs:[{q:"What is the difference between peer pressure and accountability?",a:"Peer pressure says everyone is doing it. Accountability says we are better than this."},{q:"Why does accountability feel uncomfortable sometimes?",a:"Because it exposes blind spots. It challenges habits. It forces honesty."},{q:"What does unhealthy accountability look like?",a:"Public embarrassment, gossip disguised as concern, control instead of care."},{q:"What does healthy accountability look like?",a:"Private respectful conversations, encouragement paired with honesty, being willing to be corrected too."},{q:"Why does God use people — not just prayer — to grow us?",a:"Because we all have blind spots. Pride grows in isolation."},{q:"Who has permission to challenge you right now?",a:"If no one comes to mind, that is not freedom — that is vulnerability."}],tk:[{ti:"Growth does not happen in isolation.",bo:"If nobody can challenge you, you will not change."},{ti:"Real teammates care more about your future than your feelings.",bo:"Comfort feels good now. Accountability pays off later."},{ti:"You do not need more hype — you need the right voices.",bo:"Choose people who sharpen you, not people who settle with you."}]},
{id:6,date:"Jan 5, 2026",title:"Friendships That Build or Break You",series:"Relationships",draft:false,anchor:{ref:"Proverbs 13:20 (NLT)",text:"Walk with the wise and become wise; associate with fools and get in trouble."},sup:[{ref:"1 Corinthians 15:33 (NLT)",text:"Bad company corrupts good character."},{ref:"Proverbs 27:17 (NLT)",text:"As iron sharpens iron, so a friend sharpens a friend."}],bi:"Friendships are shaping you every day — even when nothing dramatic is happening. The question is not are my friends good people. The question is who am I becoming because of them.",bd:[{ph:"Walk with the wise...",pts:["Walking implies time, rhythm, and direction. You choose pace and proximity.","The friendships you invest in most are the ones shaping you most."],co:{lb:"Say this to your students",tx:"You do not just pick friends. You pick who you are becoming. Every friendship is moving you somewhere."}},{ph:"...and become wise. Associate with fools and get in trouble.",pts:["Wisdom is transferable. You absorb the habits and values of the people closest to you.","Corruption happens slowly. What once bothered you eventually feels normal."],co:{lb:"Real-life example",tx:"Think about how your humor changes around different friend groups. Influence is always happening — you are either growing or drifting."}}],sbd:[{ref:"1 Corinthians 15:33",pt:"You cannot spend all your time in the wrong environment and stay unaffected. Corruption is quiet. It just happens — over time, one compromise at a time."},{ref:"Proverbs 27:17",pt:"Sharpening requires friction. If a friendship never challenges you, it may not be sharpening you."}],qs:[{q:"Who has the most influence over your decisions right now?",a:"Influence is not always loud. It is often who you do not want to disappoint."},{q:"How do your friends affect the way you talk and react under pressure?",a:"The people closest to you are in your head even when they are not in the room."},{q:"Have you ever ignored a conviction because you did not want to lose a friendship?",a:"What did that cost you? Let them sit with it."},{q:"Can a friendship still be loving if you create distance?",a:"Yes. Love does not require equal access."},{q:"Are you more often being sharpened — or doing the sharpening?",a:"Healthy friendships go both ways."},{q:"What is one friendship God may be asking you to evaluate — not end, but adjust?",a:"Evaluation does not mean elimination — it means intentionality."}],tk:[{ti:"Your friendships are shaping your future — whether you chose it or not.",bo:"Be intentional with influence."},{ti:"Distance does not mean rejection — it means wisdom.",bo:"Not everyone needs the same level of access to you."},{ti:"God uses people to grow people.",bo:"Choose relationships that move you closer to who He made you to be."}]},
{id:7,date:"Dec 15, 2025",title:"Conviction vs. Condemnation",series:"Identity & Worth",draft:false,anchor:{ref:"Romans 8:1 (NLT)",text:"So now there is no condemnation for those who belong to Christ Jesus."},sup:[{ref:"John 16:8 (NIV)",text:"When he comes, he will convict the world about sin, righteousness, and judgment."},{ref:"Psalm 34:18 (NLT)",text:"The Lord is close to the brokenhearted; he rescues those whose spirits are crushed."}],bi:"God does not use shame to change you. Conviction draws you closer to God. Condemnation pushes you away. If a voice leaves you feeling hopeless and stuck — it is not from God.",bd:[{ph:"So now...",pts:["This is a present promise — not once you fix yourself. Right now.","Grace applies to the person you are today."],co:{lb:"Say this to your students",tx:"You do not have to clean yourself up before God will accept you. So now means exactly that. Right now. As you are."}},{ph:"There is no condemnation for those who belong to Christ Jesus.",pts:["Condemnation attacks identity. It says you are the problem — not just you made a mistake.","God never speaks to His children that way."],co:{lb:"Real-life example",tx:"There is a difference between a coach who corrects the play and one who says you are the reason we lose. God is the first kind."}}],sbd:[{ref:"John 16:8",pt:"Conviction is specific. It shows you what needs to change and points you back to God. Conviction says this needs to go. Condemnation says you are hopeless. They do not sound the same."},{ref:"Psalm 34:18",pt:"God does not back away when you mess up. He moves toward the brokenhearted. After your worst moment — God is closer, not further."}],qs:[{q:"What does condemnation usually sound like in real life?",a:"Loud, accusing, repetitive. It focuses on who you are, not just what you did."},{q:"How is conviction different from condemnation?",a:"Conviction is specific and hopeful. Condemnation is heavy and vague."},{q:"Why do people confuse shame with God's voice?",a:"Because shame feels intense — and people assume intensity equals truth."},{q:"What usually happens when someone believes condemnation instead of conviction?",a:"They hide from God, give up, repeat the same mistakes."},{q:"When you mess up, do you usually run to God or hide from Him?",a:"How you respond after failure reveals what you actually believe about God's heart."},{q:"What would change if you believed God corrects you because He loves you?",a:"You would stop fearing correction and start trusting it."}],tk:[{ti:"God corrects to restore, not to shame.",bo:"If it crushes you and leaves you hopeless — it is not from Him."},{ti:"Conviction brings you closer. Condemnation pushes you away.",bo:"Pay attention to where the voice leads you."},{ti:"Grace does not excuse sin — it empowers change.",bo:"Freedom begins when shame ends."}]},
{id:8,date:"Nov 25, 2025",title:"Discipline That Develops You",series:"Faith & Character",draft:false,anchor:{ref:"Matthew 6:6 (NLT)",text:"But when you pray, go into your room, close the door, and pray to your Father in private. Then your Father, who sees everything, will reward you."},sup:[{ref:"Matthew 6:1 (NLT)",text:"Be careful not to do your acts of righteousness publicly, to be seen by others."},{ref:"Proverbs 25:28 (NLT)",text:"A person without self-control is like a city with broken-down walls."}],bi:"God cares more about your heart than your hype. Real faith grows strongest in private — not on a stage. Who you are when nobody is watching is who you actually are.",bd:[{ph:"Go into your room, close the door...",pts:["Jesus is describing intentional privacy — a deliberate choice to get alone with God.","This is not about where you pray. It is about why."],co:{lb:"Say this to your students",tx:"The version of your faith that nobody sees is the realest version. What you do in private is who you actually are."}},{ph:"...pray to your Father in private. Then your Father will reward you.",pts:["Father is personal. Not a performance — a relationship.","God is not impressed by loud prayers. He is moved by honest ones."],co:{lb:"Real-life example",tx:"You can post a verse, show up to church, and look the part — but if there is nothing happening between you and God in private, the public stuff is just a show."}}],sbd:[{ref:"Matthew 6:1",pt:"The problem is not doing good things — it is doing them to be seen. The same action can be worship or performance depending on why you are doing it."},{ref:"Proverbs 25:28",pt:"Self-control is the wall that protects everything inside. Discipline is not a cage. It is a wall that keeps the good things safe."}],qs:[{q:"What does it mean to have a private faith with God?",a:"Doing things like praying, reading, giving, and obeying even when no one sees you."},{q:"Why does Jesus warn against showing off your faith?",a:"Because it becomes about image instead of God."},{q:"What are some reasons students feel pressure to perform spiritually?",a:"Wanting to look holy around friends, social media, trying to impress leaders."},{q:"Why does God reward things done in secret?",a:"Because it proves your heart is focused on Him."},{q:"Who are you when nobody is watching?",a:"Let this land. Do not rush past it."},{q:"What is one private spiritual habit you could start this week?",a:"Pray 3 minutes before bed. Read one chapter a day. Small hidden steps build strong faith."}],tk:[{ti:"Real faith shows up in private before it ever shows up in public.",bo:"If your relationship with God only exists around people, it is not rooted deeply."},{ti:"God sees what no one else sees — and He rewards it.",bo:"Attention is temporary. What you do for God alone lasts forever."},{ti:"You do not have to perform for God. You just have to be honest with Him.",bo:"Honest prayers beat loud prayers every time."}]},
{id:9,date:"Sep 10, 2025",title:"Strength in Weakness",series:"Faith & Character",draft:false,anchor:{ref:"2 Corinthians 12:9-10 (ESV)",text:"My grace is sufficient for you, for my power is made perfect in weakness. For when I am weak, then I am strong."},sup:[{ref:"Psalm 34:18 (ESV)",text:"The Lord is near to the brokenhearted and saves the crushed in spirit."},{ref:"Isaiah 40:29 (NIV)",text:"He gives strength to the weary and increases the power of the weak."}],bi:"Our weakness is not the end of the story — it is the place where God's grace and power shine the brightest. You do not have to hold it all together. God already does.",bd:[{ph:"My grace is sufficient for you...",pts:["Sufficient means fully enough. Not barely enough — completely enough.","Paul asked God three times to take the struggle away. God said no — but also said I am enough for this."],co:{lb:"Say this to your students",tx:"God did not remove Paul's pain. He met him in it. He does not always fix it — but He always shows up in it."}},{ph:"...for my power is made perfect in weakness.",pts:["When you are running on empty, there is no question where the strength is coming from.","Surrender is not giving up. It is trading your strength for His."],co:{lb:"Real-life example",tx:"Think about a flashlight. You see its light most clearly in the dark. God's strength shows up brightest when you have none left of your own."}}],sbd:[{ref:"Psalm 34:18",pt:"God does not back away from broken people. He moves toward them. The brokenhearted are not a burden — they are exactly who He came for."},{ref:"Isaiah 40:29",pt:"He gives strength to the weary. Not the ones who have it together. The ones who are worn out."}],qs:[{q:"What does it feel like to be crushed in spirit?",a:"Heavy, hopeless, worn out. That is exactly where God says He is closest."},{q:"Why do you think God did not just take Paul's struggle away?",a:"Because God wanted Paul to depend on Him. Hard seasons remind us we need Him."},{q:"What does it mean that God's power is made perfect in weakness?",a:"Weakness creates the space for His strength to show up fully."},{q:"How can weakness actually make you stronger?",a:"Real strength is not about control — it is about trust."},{q:"Is there an area where you have been trying to hold it together on your own?",a:"Give them space. Do not rush past it."},{q:"What would it look like to surrender that to God this week?",a:"Not performing strength. Just bringing it to God honestly."}],tk:[{ti:"God is near to the brokenhearted.",bo:"You are never alone in your pain. He moves toward the broken."},{ti:"His grace is enough for your worst day.",bo:"Weakness is not the end. It is where God's strength shows up the most."},{ti:"Real strength is surrender.",bo:"You do not have to hold it all together. God already does."}]},
{id:10,date:"Sep 1, 2025",title:"Humility in Victory and Defeat",series:"Faith & Character",draft:false,anchor:{ref:"James 4:6 (NIV)",text:"God opposes the proud but gives grace to the humble."},sup:[{ref:"Philippians 2:3-4 (NIV)",text:"Do nothing out of selfish ambition or vain conceit. Rather, in humility value others above yourselves."},{ref:"Proverbs 16:18 (NIV)",text:"Pride goes before destruction, a haughty spirit before a fall."}],bi:"Pride separates us from God and others. Humility is not weakness — it is the posture that opens the door for God's strength, wisdom, and blessing. God does not just ignore pride — He actively opposes it.",bd:[{ph:"God opposes the proud...",pts:["This is not passive — God actively resists pride.","Pride puts self at the center instead of God."],co:{lb:"Say this to your students",tx:"Pride is not just a bad attitude — it is a posture that pushes God out. And when God is opposing you, everything gets harder."}},{ph:"...but gives grace to the humble.",pts:["Humility opens the door. Grace, wisdom, strength, and favor flow toward the humble.","This is not about being a pushover. It is about knowing where your strength comes from."],co:{lb:"Real-life example",tx:"Think about a coach who can actually be coached. They grow faster than the one who thinks they already know everything."}}],sbd:[{ref:"Philippians 2:3-4",pt:"Humility is not just an attitude — it is an action. It shows up in how you treat teammates and whether you play for the team or for your stats."},{ref:"Proverbs 16:18",pt:"Pride has a track record. The fall always follows the pride. It is not a matter of if. It is when."}],qs:[{q:"In sports or life, what does pride usually look like?",a:"Boasting, trash talk, blaming teammates, ignoring correction — pride always makes it about you."},{q:"Do you think humility makes someone stronger or weaker?",a:"Stronger — because humility means you are teachable."},{q:"What is the difference between confidence and selfish ambition?",a:"Confidence trusts God's gifts. Selfish ambition chases recognition for self."},{q:"Why does God take pride so seriously?",a:"Because pride puts self in the place of God. It leads to downfall every single time."},{q:"How should a Christian respond to a big win without being arrogant?",a:"Celebrate without arrogance. Thank God first. Acknowledge the people who contributed."},{q:"Where do you see pride creeping into your own life right now?",a:"Give them space to be honest. This is where the study gets real."}],tk:[{ti:"God does not just ignore pride — He opposes it.",bo:"Walk in humility and stay close to God."},{ti:"Humility is what makes you coachable, growable, and usable.",bo:"Pride locks the door. Humility opens it."},{ti:"How you handle victory and defeat says everything about your character.",bo:"Both moments are opportunities to point to something bigger than yourself."}]},
{id:11,date:"Aug 25, 2025",title:"Handling Temptation — Standing Strong When It's Hard",series:"Faith & Character",draft:false,anchor:{ref:"1 Corinthians 10:13 (NIV)",text:"No temptation has overtaken you except what is common to mankind. And God is faithful; he will not let you be tempted beyond what you can bear. But when you are tempted, he will also provide a way out so that you can endure it."},sup:[{ref:"James 4:7 (NIV)",text:"Submit yourselves, then, to God. Resist the devil, and he will flee from you."},{ref:"Matthew 26:41 (NIV)",text:"Watch and pray so that you will not fall into temptation. The spirit is willing, but the flesh is weak."}],bi:"Temptation is real, but so is God's power. You will face pressure every day, but you do not have to give in. God promises a way out, His Word arms you, and prayer gives you strength.",bd:[{ph:"No temptation has overtaken you except what is common to mankind...",pts:["Everyone faces temptation — you are not the only one and you are not weird for struggling.","Paul does not say temptation will not come. He says God has already prepared you for it."],co:{lb:"Say this to your students",tx:"You are not broken because you are tempted. Jesus was tempted too. The difference is what you do when it shows up."}},{ph:"God is faithful; he will also provide a way out.",pts:["God sets a limit on what reaches you. Nothing gets past Him first.","There is always a door. Always. God never puts you in a room with no exit."],co:{lb:"Say this to your students",tx:"The exit is always there. The question is whether you are looking for it or looking for a reason to stay."}}],sbd:[{ref:"James 4:7",pt:"Resistance starts with submission. You fight from a position of being under God. Submit first, then resist. The order matters."},{ref:"Matthew 26:41",pt:"Jesus said this the night He was betrayed. Prayer before temptation is armor. Prayer after is damage control. Both matter, but one is better."}],qs:[{q:"Why does it help to know you are not the only one who struggles with temptation?",a:"It breaks isolation. Shame thrives when you think you are alone."},{q:"What are some ways out God might give when you are tempted?",a:"Walking away, changing the subject, calling a friend, praying in the moment — the exit looks different every time but it is always there."},{q:"What is the difference between praying after you mess up vs. before temptation comes?",a:"Praying after brings forgiveness. Praying before builds strength. One is a shield, the other is a bandage."},{q:"What does it look like to resist temptation in real life at school?",a:"Not cheating, walking away from gossip, saying no when friends pressure you."},{q:"Why is it important to submit to God before you try to resist the devil?",a:"Because on your own you are weak. Resistance that starts with God has something to stand on."},{q:"What is one temptation you keep running into — and what could the way out look like this week?",a:"This is personal. Let them answer honestly. Do not rush past it."}],tk:[{ti:"You are never alone in temptation.",bo:"God knows it and He has already made a way out."},{ti:"Resistance starts before temptation arrives.",bo:"Prayer and God's Word are your armor. Do not wait until you are in the middle of it."},{ti:"There is always a way out.",bo:"God is faithful. The exit is always there — you just have to choose it."}]},
{id:12,date:"Apr 21, 2026",title:"Serving Others Before Yourself",series:"Faith & Character",draft:false,anchor:{ref:"Mark 10:45 (NLT)",text:"For even the Son of Man came not to be served but to serve others and to give his life as a ransom for many."},sup:[{ref:"Philippians 2:3-4 (NLT)",text:"Don't be selfish; don't try to impress others. Be humble, thinking of others as better than yourselves."},{ref:"Galatians 5:13 (NLT)",text:"Use your freedom to serve one another in love."}],bi:"Greatness in God's kingdom looks nothing like greatness in the world. The world says climb higher, get more, and make sure people know your name. Jesus flipped that completely. He said the greatest among you is the one who serves. Serving is not something you do when it is convenient or when someone is watching. It is who you are becoming — and it starts with the heart, not the act.",bd:[{ph:"For even the Son of Man came not to be served...",pts:["Jesus had every right to be served. He is God. He created everything. He owed nobody anything.","But He showed up as a servant — not because He had to, but because He chose to.","This is not a suggestion. This is the model He set by how He lived."],co:{lb:"Say this to your students",tx:"If the Creator of the universe showed up to wash feet and give His life away, what does that say about how we should treat the people around us? Serving is not beneath you. It was not beneath Him."}},{ph:"...but to serve others...",pts:["Service was not a side task for Jesus — it was the whole point of why He came.","Every healing, every meal, every conversation — all of it oriented outward toward others.","Real service is not about what you get out of it. It is about what the other person needs."],co:{lb:"Real-life example",tx:"Think about the difference between doing something nice because you want someone to owe you versus because you genuinely care. Jesus always operated out of the second one. No agenda. No keeping score. Just love in action."}},{ph:"...and to give his life as a ransom for many.",pts:["The ultimate act of service was the cross. He gave everything so we could have everything.","When you serve, you are putting flesh on the gospel. You are showing people what Jesus looks like."],co:{lb:"Say this to your students",tx:"Every time you put someone else's needs before your own — in the small, quiet, unseen moments — you are walking in the same direction He walked."}}],sbd:[{ref:"Philippians 2:3-4",pt:"Humility is not thinking less of yourself — it is thinking of yourself less. The moment you walk into a room asking how can I help instead of how can I be seen, everything changes."},{ref:"Galatians 5:13",pt:"Freedom is not a license to live for yourself — it is an opportunity to give yourself away. Freedom that only serves yourself is wasted freedom."}],qs:[{q:"When you hear the word servant what comes to mind — and does it feel like a good thing or a weak thing?",a:"In our culture servant sounds like the bottom of the ladder. But Jesus said it is actually the top. Where did you learn what greatness looks like — and does it match what Jesus taught?"},{q:"What makes it hard to serve without wanting recognition for it?",a:"We are wired to want to be seen. That is not evil — but it becomes a problem when the need to be seen drives everything we do. If you serve to be seen, the applause is your only reward."},{q:"Think about someone in your life who serves quietly without making it about themselves. What do you notice about them?",a:"There is usually a peace and groundedness about people who are genuinely oriented toward others. Who comes to mind? What makes them stand out?"},{q:"What is the difference between serving out of obligation and serving out of love?",a:"Obligation says I have to. Love says I get to. One drains you. The other actually fills you — because you are doing it from the right place."},{q:"Is there someone God might be asking you to serve right now — and what is making it hard?",a:"This is personal. Give them space to think honestly. Sometimes the person God is calling us to serve is the hardest person to love."},{q:"How does knowing Jesus served you — at the highest possible cost — change how you think about serving others?",a:"You were served first. Before you ever did anything to earn it. Real service flows out of gratitude for what Jesus already did."}],tk:[{ti:"Greatness in God's kingdom is measured by how you serve, not how you shine.",bo:"Jesus did not come to be impressive. He came to give. That is the model and it is not optional."},{ti:"The heart behind the act matters more than the act itself.",bo:"Serving to be seen is performance. Serving because you love people is worship. God knows the difference."},{ti:"You were served first.",bo:"Jesus gave His life for you before you ever gave anything back. Let that be the fuel behind every act of service you offer."}]}
];}
function toggleDark(){document.body.classList.toggle('dark');document.querySelector('.mbtn').textContent=document.body.classList.contains('dark')?'☀️':'🌙';}
function setTab(t,el){curTab=t;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});el.classList.add('active');var iT=t==='topics';document.getElementById('tlbr').style.display=iT?'none':'';document.getElementById('grid').style.display=iT?'none':'';document.getElementById('tgrid').style.display=iT?'grid':'none';if(iT)drawTopics();else draw();}
function updateStats(){var pub=0,dr=0,tot=0,cnt=0;for(var i=0;i<data.length;i++){if(data[i].draft)dr++;else pub++;if(attend[i]){tot+=parseInt(attend[i]);cnt++;}}document.getElementById('stPub').textContent=pub;document.getElementById('stDr').textContent=dr;document.getElementById('stAt').textContent=cnt?Math.round(tot/cnt):'—';var lc=0;for(var k in liked){if(liked[k])lc++;}document.getElementById('stLk').textContent=lc;}
function draw(){
  var q=document.getElementById('srch').value.toLowerCase();
  var grid=document.getElementById('grid');
  if(curTab==='series'&&!q){
    var sm={};for(var j=0;j<data.length;j++){if(data[j].draft)continue;var sr=data[j].series||'Uncategorized';if(!sm[sr])sm[sr]=[];sm[sr].push(j);}
    var h='';for(var sn in sm){h+='<div class="shdr">'+sn+' ('+sm[sn].length+')</div>';for(var si=0;si<sm[sn].length;si++)h+=buildCard(sm[sn][si]);}
    grid.innerHTML=h;return;
  }
  var list=[];
  for(var i=0;i<data.length;i++){
    var s=data[i];
    if(curTab==='liked'&&!liked[i])continue;
    if(curTab==='drafts'&&!s.draft)continue;
    if(curTab==='all'&&s.draft)continue;
    if(q){var vm=s.anchor.ref.toLowerCase().indexOf(q)>=0||s.anchor.text.toLowerCase().indexOf(q)>=0;if(!vm){for(var sv=0;sv<s.sup.length;sv++){if(s.sup[sv].ref.toLowerCase().indexOf(q)>=0)vm=true;}}if(s.title.toLowerCase().indexOf(q)<0&&s.date.toLowerCase().indexOf(q)<0&&s.bi.toLowerCase().indexOf(q)<0&&!vm&&(!s.series||s.series.toLowerCase().indexOf(q)<0))continue;}
    list.push(i);
  }
  if(!list.length){grid.innerHTML='<div class="emsg">'+(curTab==='liked'?'No liked studies yet.':curTab==='drafts'?'No drafts yet. Click a topic idea to create one.':'No studies found.')+'</div>';return;}
  var html='';for(var jj=0;jj<list.length;jj++)html+=buildCard(list[jj]);
  grid.innerHTML=html;
}
function buildCard(idx){
  var s=data[idx];
  var h='<div class="card'+(s.draft?' draft':'')+'" onclick="openModal('+idx+')">';
  if(s.draft)h+='<div class="cbadge">Draft</div>';
  h+='<div class="cnum">'+(idx+1)+'</div>';
  h+='<button class="lbtn" onclick="event.stopPropagation();toggleLike('+idx+')">'+(liked[idx]?'❤️':'🤍')+'</button>';
  h+='<div class="cdate">'+s.date+'</div>';
  if(s.series)h+='<div class="cseries">📚 '+s.series+'</div>';
  h+='<div class="ctitle">'+s.title+'</div>';
  if(s.anchor.ref)h+='<div class="cverse">'+s.anchor.ref+' — '+s.anchor.text.substring(0,65)+'...</div>';
  if(attend[idx])h+='<div class="cattend">👥 '+attend[idx]+' students</div>';
  h+='</div>';return h;
}
function drawTopics(){
  var tg=document.getElementById('tgrid'),h='';
  for(var i=0;i<topics.length;i++){h+='<div class="tcard" onclick="createDraft('+i+')"><div class="tnum">'+(i+1)+'</div><div class="tname">'+topics[i]+'</div></div>';}
  tg.innerHTML=h;
}
function createDraft(ti){
  data.unshift({id:Date.now(),date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),title:topics[ti],series:'',draft:true,anchor:{ref:'',text:''},sup:[],bi:'Draft — build this study out.',bd:[],sbd:[],qs:[],tk:[]});
  updateStats();setTab('drafts',document.querySelectorAll('.tab')[2]);showToast('Draft created for: '+topics[ti]);
}
function toggleLike(i){liked[i]=!liked[i];updateStats();draw();}
function openModal(idx){
  curIdx=idx;var s=data[idx];
  document.getElementById('mdt').textContent=s.date+(s.series?'  •  '+s.series:'')+(s.draft?'  •  DRAFT':'');
  document.getElementById('mttl').textContent=s.title;
  var h='';
  h+='<div class="sec"><div class="slb">Big Idea</div><div class="bi">'+s.bi+'</div></div>';
  if(s.anchor.ref)h+='<div class="sec"><div class="slb">Anchor Verse</div><div class="vbx"><b>'+s.anchor.ref+'</b>'+s.anchor.text+'</div></div>';
  if(s.bd&&s.bd.length){h+='<div class="sec"><div class="slb">Verse Breakdown</div>';for(var i=0;i<s.bd.length;i++){var b=s.bd[i];h+='<div class="ph">'+b.ph+'</div>';for(var p=0;p<b.pts.length;p++)h+='<div class="pt">→ '+b.pts[p]+'</div>';if(b.co)h+='<div class="co"><b>'+b.co.lb+'</b>'+b.co.tx+'</div>';}h+='</div>';}
  if(s.sup&&s.sup.length){h+='<div class="sec"><div class="slb">Supporting Verses</div>';for(var v=0;v<s.sup.length;v++){h+='<div class="vbx"><b>'+s.sup[v].ref+'</b>'+s.sup[v].text+'</div>';if(s.sbd&&s.sbd[v])h+='<div class="pt" style="margin-bottom:10px">→ '+s.sbd[v].pt+'</div>';}h+='</div>';}
  if(s.qs&&s.qs.length){h+='<div class="sec"><div class="slb">Discussion Questions</div>';for(var q=0;q<s.qs.length;q++)h+='<div class="dq"><div class="dqq">'+(q+1)+'. '+s.qs[q].q+'</div><div class="dqa">'+s.qs[q].a+'</div></div>';h+='</div>';}
  if(s.tk&&s.tk.length){h+='<div class="sec"><div class="slb">3 Takeaways</div>';for(var t=0;t<s.tk.length;t++)h+='<div class="tkb"><b>'+s.tk[t].ti+'</b><span>'+s.tk[t].bo+'</span></div>';h+='</div>';}
  h+='<div class="sec"><div class="slb">Leader Notes</div><textarea class="nta" id="ntaf" placeholder="How did the session go? What hit? What to revisit...">'+(notes[idx]||'')+'</textarea><button class="nsv" onclick="saveNotes()">Save Notes</button></div>';
  h+='<div class="sec"><div class="slb">Attendance</div><div class="arow"><input class="ainp" id="atf" type="number" min="0" placeholder="# students" value="'+(attend[idx]||'')+'"><button class="asv" onclick="saveAttend()">Save</button>'+(attend[idx]?'<span class="adsp">Last: '+attend[idx]+' students</span>':'')+'</div></div>';
  if(!s.draft){
    h+='<hr class="dvd"><div class="dvdl">Student Fill-In Page</div>';
    h+='<div class="brow"><button class="btn bdl" onclick="doDownload()">Download Student Page</button><button class="btn bsh" onclick="doShare()">Copy Full Study</button><button class="btn bsc" onclick="document.getElementById(\'scard\').scrollIntoView({behavior:\'smooth\'})">Social Media Card</button></div>';
    h+='<div class="sec"><div class="slb">Main Theme</div><div class="flt">'+s.bi+'</div></div>';
    h+='<div class="sec"><div class="slb">Verses</div>';
    var allV=[s.anchor].concat(s.sup);for(var fv=0;fv<allV.length;fv++)h+='<div class="flv"><b>'+allV[fv].ref+'</b>'+allV[fv].text+'</div>';
    h+='</div>';
    h+='<div class="sec"><div class="slb">Discussion Questions</div>';
    for(var fq=0;fq<s.qs.length;fq++)h+='<div class="flq"><b>'+(fq+1)+'. '+s.qs[fq].q+'</b><div class="fll"></div><div class="fll"></div><div class="fll"></div></div>';
    h+='</div>';
    h+='<div class="sec"><div class="slb">3 Takeaways — What stands out to you?</div>';
    for(var ft=0;ft<s.tk.length;ft++)h+='<div class="fltk"><b>'+s.tk[ft].ti+'</b><div class="fll"></div><div class="fll"></div></div>';
    h+='</div>';
    h+='<hr class="dvd"><div class="dvdl">Social Media Card</div>';
    h+='<div class="scard" id="scard"><div class="scl">TF Bible Studies</div><div class="sct">'+s.title+'</div><div class="scd">'+s.date+(s.series?'  •  '+s.series:'')+'</div><div class="scbi">'+s.bi+'</div><div class="sckl">3 Takeaways</div>';
    for(var sc=0;sc<s.tk.length;sc++)h+='<div class="sck">'+(sc+1)+'. '+s.tk[sc].ti+'</div>';
    h+='<div class="scf">@TFBibleStudies</div></div>';
    h+='<button class="sccb" onclick="copySCard()">Copy Social Card Text</button>';
  }
  if(s.draft)h+='<hr class="dvd"><button class="delbtn" onclick="deleteDraft('+idx+')">🗑 Delete This Draft</button>';
  document.getElementById('mbdy').innerHTML=h;
  document.getElementById('ov').classList.add('open');
}
function deleteDraft(idx){if(data[idx]&&data[idx].draft){data.splice(idx,1);closeModal();updateStats();draw();showToast('Draft deleted.');}}
function saveNotes(){notes[curIdx]=document.getElementById('ntaf').value;showToast('Notes saved!');}
function saveAttend(){var v=document.getElementById('atf').value;if(v){attend[curIdx]=parseInt(v);updateStats();draw();showToast('Attendance saved — '+v+' students!');}}
function closeModal(){document.getElementById('ov').classList.remove('open');}
function maybeClose(e){if(e.target===document.getElementById('ov'))closeModal();}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none';},3000);}
function copyText(txt){try{var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);return true;}catch(e){return false;}}
function doDownload(){
  var s=data[curIdx];
  var vr='';var allV=[s.anchor].concat(s.sup);for(var i=0;i<allV.length;i++)vr+='<div class="v"><span class="vr">'+allV[i].ref+'</span><span class="vt">'+allV[i].text+'</span></div>';
  var qr='';for(var q=0;q<s.qs.length;q++)qr+='<div class="qb"><div class="qq">'+(q+1)+'. '+s.qs[q].q+'</div><div class="ln"></div><div class="ln"></div><div class="ln"></div></div>';
  var tr='';for(var t=0;t<s.tk.length;t++)tr+='<div class="tb"><div class="tt">'+s.tk[t].ti+'</div><div class="ln"></div><div class="ln"></div></div>';
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+s.title+'</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Georgia,serif;max-width:680px;margin:0 auto;padding:40px 32px;color:#000;background:#fff;}h1{font-size:22px;text-align:center;margin-bottom:4px;}.th{font-size:13px;text-align:center;font-style:italic;color:#333;margin-bottom:20px;}.vbox{border-top:1px solid #000;border-bottom:1px solid #000;padding:12px 0;margin-bottom:24px;}.v{margin-bottom:10px;font-size:13px;}.vr{font-weight:bold;display:block;margin-bottom:2px;}.vt{font-style:italic;}.sc{font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;font-family:Arial,sans-serif;border-bottom:1px solid #000;padding-bottom:4px;}.qb{margin-bottom:20px;}.qq{font-size:14px;font-weight:bold;margin-bottom:8px;}.ln{border-bottom:1px solid #000;height:22px;margin-bottom:5px;}.tb{margin-bottom:18px;}.tt{font-size:14px;font-weight:bold;margin-bottom:6px;}.tks{margin-top:24px;border-top:1px solid #000;padding-top:16px;}</style></head><body><h1>'+s.title+'</h1><p class="th">'+s.bi+'</p><div class="vbox">'+vr+'</div><div class="sc">Discussion Questions</div>'+qr+'<div class="tks"><div class="sc">3 Takeaways — What stands out to you?</div>'+tr+'</div></body></html>';
  var blob=new Blob([html],{type:'text/html'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=s.title.replace(/[^a-z0-9]/gi,'_')+'.html';a.click();URL.revokeObjectURL(url);showToast('Downloaded!');
}
function doShare(){
  var s=data[curIdx];
  var txt='TF BIBLE STUDIES\n'+s.title+' | '+s.date+'\n\nBIG IDEA\n'+s.bi+'\n\nANCHOR VERSE\n'+s.anchor.ref+'\n"'+s.anchor.text+'"\n\nVERSE BREAKDOWN\n';
  for(var i=0;i<s.bd.length;i++){txt+='\n'+s.bd[i].ph+'\n';for(var p=0;p<s.bd[i].pts.length;p++)txt+='→ '+s.bd[i].pts[p]+'\n';if(s.bd[i].co)txt+='\n['+s.bd[i].co.lb+']\n'+s.bd[i].co.tx+'\n';}
  txt+='\nSUPPORTING VERSES\n';for(var v=0;v<s.sup.length;v++){txt+='\n'+s.sup[v].ref+'\n"'+s.sup[v].text+'"\n';if(s.sbd[v])txt+='→ '+s.sbd[v].pt+'\n';}
  txt+='\nDISCUSSION QUESTIONS\n';for(var q=0;q<s.qs.length;q++)txt+='\n'+(q+1)+'. '+s.qs[q].q+'\n'+s.qs[q].a+'\n';
  txt+='\n3 TAKEAWAYS\n';for(var t=0;t<s.tk.length;t++)txt+='\n'+(t+1)+'. '+s.tk[t].ti+'\n'+s.tk[t].bo+'\n';
  if(notes[curIdx])txt+='\nLEADER NOTES\n'+notes[curIdx]+'\n';
  if(copyText(txt))showToast('Full study copied!');else showToast('Could not copy. Try again.');
}
function copySCard(){
  var s=data[curIdx];var txt='TF Bible Studies\n'+s.title+' | '+s.date+'\n\n'+s.bi+'\n\n3 Takeaways\n';
  for(var t=0;t<s.tk.length;t++)txt+=(t+1)+'. '+s.tk[t].ti+'\n';
  txt+='\n@TFBibleStudies';
  if(copyText(txt))showToast('Social card copied!');else showToast('Could not copy. Try again.');
}
initData();updateStats();draw();
</script>
</body>
</html>
